gpu:
  index: 0
  cooldown_seconds: 8

models:
  aiark/litellm-models:
    route: /v1/models
    upstream: http://litellm:4000
    uses_gpu: false
    required_vram_mb: 0
    health:
      type: http
      url: http://litellm:4000/health/liveliness
      method: GET
      wait_timeout_seconds: 60

  aiark/gemma4-e2b:
    route: /v1/chat/completions
    upstream: http://litellm:4000
    required_vram_mb: 0
    health:
      type: http
      url: http://litellm:4000/health/liveliness
      method: GET
      wait_timeout_seconds: 60

  aiark/z-image-turbo:
    route: /image/v1/images/generations
    upstream: http://image-api:8003
    required_vram_mb: 12000
    health:
      type: http
      url: http://image-api:8003/health
      method: GET
      wait_timeout_seconds: 180
    unload:
      type: http
      url: http://image-api:8003/admin/unload
      timeout_seconds: 30

  aiark/qwen-image-2512-q4km:
    route: /image/v1/images/generations
    upstream: http://image-api:8003
    required_vram_mb: 22000
    health:
      type: http
      url: http://qwen-image-api:8004/health
      method: GET
      wait_timeout_seconds: 180

  aiark/qwen3-tts-0.6b-customvoice:
    route: /tts/v1/audio/speech
    upstream: http://tts-api:8002
    required_vram_mb: 8000
    health:
      type: http
      url: http://tts-api:8002/health
      method: GET
      wait_timeout_seconds: 180
    unload:
      type: http
      url: http://tts-api:8002/admin/unload
      timeout_seconds: 30

  aiark/acestep-1.5:
    route: /music/release_task
    upstream: http://music-api:8005
    required_vram_mb: 16000
    health:
      type: http
      url: http://music-api:8005/health
      method: GET
      wait_timeout_seconds: 300
